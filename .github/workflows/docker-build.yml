name: CI and Docker Publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  BACKEND_IMAGE: charbelsalameh123/internship-backend-image
  FRONTEND_IMAGE: charbelsalameh123/internship-frontend-image

jobs:
  validate:
    name: Validate application
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Check required backend files
        shell: bash
        run: |
          test -f backend/package.json
          test -f backend/package-lock.json
          test -f backend/server.js
          test -f backend/dataBase.js
          test -f backend/dockerfile

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      # The current package.json test script intentionally exits with code 1,
      # so syntax validation is used until real automated tests are added.
      - name: Check backend JavaScript syntax
        working-directory: backend
        run: |
          node --check server.js
          node --check dataBase.js

      - name: Validate Docker Compose file
        env:
          JWT_SECRET: github-actions-validation-secret
        run: docker compose -f docker-compose.yml config --quiet

  docker:
    name: Build and publish Docker images
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          file: ./backend/dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./docs
          file: ./docs/dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend