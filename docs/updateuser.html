<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit User</title>
<style>
    .form{
        text-align:center;
    }
</style>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    
    <h1 class="text-center text-primary fw-bold mt-5" id="Welcome-Message">Welcome User</h1>
    <p class="text-center text-muted fs-5">Kindly update the needed informations.</p>
    <br>
    <div class="form">
        <label for="fname">First Name:</label>
            <input type="text" id="fname" placeholder="Enter you first name">
                <br>
                <br>
        <label for="lname">Last Name:</label>
            <input type="text" id="lname" placeholder="Enter you last name">
                <br>
                <br>
        <label for="selectgender">Select your gender: </label>
        <select id="selectgender">
            <option value="">Choose an option...</option>
        </select>
        <br>
        <br>
        <div style="text-align: center;">
    <p>Current image:</p>

        <p id="noImageMessage">No Image</p>
        <img
        id="currentImage"
        src=""
        alt="Current profile image"
        width="150"
        height="150"
        style=" object-fit: cover; border-radius: 8px; display: block;
                margin: 0 auto;"
    >

    <br><br>
    <div style="text-align: center;">
        <label for="selectimg" class="image-button">Select Image: </label>
        <input type="file" id="imgInput" accept="image/*">
    </div>
        <br>
        <br>
        <button style="text-align: center; " id="saveBtn">Save</button>
        <br><br>
    </div>
    <script src="config.js"></script>
    <script type="module" src="./updateuser.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>

</body>
</html>
