services:
  mongodb:
    image: mongo:8
    container_name: internship-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--username",
          "admin",
          "--password",
          "admin",
          "--authenticationDatabase",
          "admin",
          "--eval",
          "db.adminCommand('ping')"
        ]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internship-network

  redis:
    image: redis:alpine
    container_name: internship-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internship-network

  backend:
    image: charbelsalameh123/internship-backend-image:latest
    build:
      context: ./backend
      dockerfile: dockerfile
    expose:
      - "3000"
    environment:
      PORT: 3000
      MONGODB_URI: mongodb://admin:admin@mongodb:27017/users_db?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}

    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internship-network

  load-balancer:
    image: nginx:alpine
    container_name: internship-load-balancer
    ports:
      - "5000:80"
    volumes:
      - ./load-balancer/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
    networks:
      - internship-network

  frontend:
    image: charbelsalameh123/internship-frontend-image:latest
    build:
      context: ./docs
      dockerfile: dockerfile
    container_name: internship-frontend
    ports:
      - "8080:80"
    depends_on:
      - load-balancer
    networks:
      - internship-network

volumes:
  mongo-data:
    external: true
    name: internship-mongo-data

  mongo-config:
    external: true
    name: internship-mongo-config

  redis-data:
    name: internship-redis-data

networks:
  internship-network:
    external: true
    name: internship-network